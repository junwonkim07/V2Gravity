name: v2gravity
description: "x-ray client"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansCJK
      fonts:
        - asset: fonts/NotoSansCJKkr-Black.otf
          weight: 900
        - asset: fonts/NotoSansCJKkr-Regular.otf
          weight: 400
  
